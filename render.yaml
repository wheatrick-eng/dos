services:
  - type: web
    name: portfolio-backend
    env: python
    rootDir: backend
    buildCommand: python3 -m venv .venv && .venv/bin/pip install -r requirements.txt
    startCommand: .venv/bin/python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: ALPHAVANTAGE_API_KEY
        sync: false

  - type: web
    name: portfolio-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: portfolio-backend
          property: host

databases:
  - name: portfolio-db
    databaseName: portfolio
    user: portfolio

